<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Usha Kiran</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,(white));
            background-size:400% 400%;
            animation:gradientMove 12s ease infinite;
            background-color: rgb(26, 26, 98);
        }
        @keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.contact-container{
    width:420px;
    background:rgb(29, 29, 88);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:25px;
    border:1px solid rgb(54, 17, 17);
    box-shadow:0 20px 50px rgba(170, 68, 68, 0.6);
    color:rgb(217, 217, 238);
    position:relative;
}

.contact-container h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
    letter-spacing:1px;
}

/* Floating Input */
.input-group{
    position:relative;
    margin-bottom: 25px;
}
.input-group input,
.input-group textarea{
    width:100%;
    padding:14px 14px 14px 40px;
    background:rgb(98, 98, 138);
    border:none;
    border-radius:12px;
    outline:none;
    color:rgb(239, 235, 235);
    font-size:14px;
}

.input-group label{
    position:absolute;
    top:14px;
    left:40px;
    font-size:14px;
    color:rgb(142, 192, 62);
    pointer-events:none;
    transition:0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label,
.input-group textarea:focus + label,
.input-group textarea:valid + label{
    top:-10px;
    left:35px;
    font-size:12px;
    background:rgba(16, 22, 60, 0.4);
    padding:0 5px;
    border-radius:5px;
}

.input-group i{
    position:absolute;
    top:15px;
    left:15px;
    color:black;
}

textarea{
    resize:none;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:black;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(11, 141, 197, 0.4);
}
button:hover{
    transform:translateY(-3px);
    background:rgba(56,189,248,0.4);
}

/* Success Message */
.success-message{
    display:none;
    margin-top:15px;
    text-align:center;
    color:blue;
    font-weight:600;
}

@media(max-width:500px){
    .contact-container{
        width:90%;
        padding:30px;
    }
}
    </style>
</head>
<body>
<div class="contact-container">
    <h2>Contact Me</h2>
    <form onsubmit="showMessage(event)">
        <div class="input-group">
            <i class="fa fa-user">
              
            </i>
<input type="text" required fdprocessedid="50csa9">
<label>Your Name</label>
</div>
<div class="input-group">
    <i class="fa fa-envelope">
      
    </i>
    <input type="email" required fdprocessedid="5bxpnq">
    <label>Your Email</label>
</div>
<div class="input-group">
    <i class="fa fa-tag">
      
    </i>
    <input type="text" required fdprocessedid="rbsul">
    <label>Subject</label>
</div>
<div class="input-group">
    <i class="fa fa-message">
    
    </i>
    <textarea rows="4" required></textarea>
    <label>Your Message</label>
</div>
<button type="success-message" id="successMsg">Messagee sent Successfully!</button>
</form>
</div>
<script>
  function showMessage(e){
    e.preventDefault();
    document.getElementById("successMsg").style.display="block";
  }
</script>
<span id="PING_IFRAME_FORM_DETECTION" style="display: none;">
</span>
</body>
</html>
